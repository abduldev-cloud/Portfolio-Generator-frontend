<div class="generator-container">
    <h2>Generate Your Portfolio</h2>
    <form (ngSubmit)="generate()">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" [(ngModel)]="userData.name" required>
        </div>
        <div class="form-group">
            <label for="title">Professional Title</label>
            <input type="text" id="title" name="title" [(ngModel)]="userData.title" required>
        </div>
        <div class="form-group">
            <label for="bio">Short Bio</label>
            <textarea id="bio" name="bio" [(ngModel)]="userData.bio" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label for="template">Select Template</label>
            <select id="template" name="template" [(ngModel)]="selectedTemplate">
                <option value="default">Modern Minimal</option>
            </select>
        </div>
        <button type="submit" class="btn-generate">Download Portfolio ZIP</button>
    </form>
</div>
